<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up</title>
    <meta name="description"
      content="A responsive user registration form with JavaScript validation for email, password, confirm password, radio buttons, and terms & conditions.">
    <link rel="icon" type="image/png" href="signup.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="sign-up">
        <h1 style="color:white">Signup </h1>
        <input type="text" id="username" placeholder="Full Name" required> <br>
        <input type="email" id="email" placeholder="Email"  required><br>
        <input type="password" id="pass" placeholder="Password" required><br>
        <input type="password" id ="confirm-pass" placeholder="Confirm Password" required><br>
        <input type="date" id="date" required><br>
        <div class="radio-group">
    <label>
        <input type="radio" name="status" value="student">
        Student
    </label>

    <label>
        <input type="radio" name="status" value="employee">
        Employee
    </label>
</div>

<div class="checkbox-group">
    <label>
        <input type="checkbox" id="terms">
        I agree to the Terms and Conditions
    </label>
</div>
        <input type="submit" id="btn" value="sign up">
        </form>
    <script src="script.js"></script>
</body>
</html>
